<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
    <link rel="stylesheet" href="style.css" />
    <title>Age calculator app</title>
  </head>
  <body>
    <main class="card" aria-label="Age calculator">
      <form id="age-form" novalidate>
        <div class="form-container">
          <div class="field" data-field="day">
            <label for="day">Day</label>
            <input type="text" id="day" name="day" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="DD" aria-describedby="day-error" />
            <small id="day-error" aria-live="polite"></small>
          </div>

          <div class="field" data-field="month">
            <label for="month">Month</label>
            <input type="text" id="month" name="month" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM" aria-describedby="month-error" />
            <small id="month-error" aria-live="polite"></small>
          </div>

          <div class="field" data-field="year">
            <label for="year">Year</label>
            <input type="text" id="year" name="year" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="YYYY" aria-describedby="year-error" />
            <small id="year-error" aria-live="polite"></small>
          </div>
        </div>

        <div class="divider">
          <hr />
          <button type="submit" class="submit-btn" aria-label="Calculate age">
            <img src="./assets/images/icon-arrow.svg" alt="" aria-hidden="true" />
          </button>
        </div>
      </form>

      <section class="output" aria-live="polite" aria-atomic="true">
        <h1><span id="YY">--</span> years</h1>
        <h1><span id="MM">--</span> months</h1>
        <h1><span id="DD">--</span> days</h1>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a rel="noopener" href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://github.com/BryanLordeus" target="_blank" rel="noopener" aria-label="Bryan Lordeus on GitHub">Bryan Lordeus</a>.
    </footer>

    <script src="script.js"></script>
  </body>
</html>
